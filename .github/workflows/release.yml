name: Release

# Tag a release to trigger:  git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release + upload binaries

jobs:
  # 1) Build wheel + sdist and publish to PyPI via Trusted Publishing (OIDC).
  pypi:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - name: Publish to PyPI
        run: uv publish
        # No token needed when this repo is configured as a Trusted Publisher
        # at https://pypi.org/manage/account/publishing/

  # 2) Build standalone binaries for each OS and attach to the GitHub Release.
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: claude-gists-linux-x86_64
          - os: macos-latest
            artifact: claude-gists-macos-arm64
          - os: windows-latest
            artifact: claude-gists-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build binary
        run: uv run --extra build pyinstaller --clean --noconfirm claude-gists.spec
      - name: Rename artifact (unix)
        if: runner.os != 'Windows'
        run: mv dist/claude-gists dist/${{ matrix.artifact }}
      - name: Rename artifact (windows)
        if: runner.os == 'Windows'
        run: Rename-Item dist/claude-gists.exe ${{ matrix.artifact }}
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
